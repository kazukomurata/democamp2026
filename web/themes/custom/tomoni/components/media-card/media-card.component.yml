$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Media card
description: A card with image, title, optional summary, and optional link.
props:
  type: object
  required:
    - title
  properties:
    title:
      type: string
      title: Title
      examples:
        - "第18回くらしの広場交流会"
    summary:
      type: string
      title: Summary
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - "<p>概要が入力できます</p>"
    url:
      type: string
      title: URL
      description: Optional link URL for the image and title.
      format: uri-reference
      examples:
        - "/sample"
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/sample.jpg"
          width: 800
          height: 600
          alt: "Blue to green gradient placeholder image"
