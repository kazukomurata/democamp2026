$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Media image
description: A simple component that displays an image media item.
props:
  type: object
  required:
    - media
  properties:
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: ../media-card/assets/sample.jpg
          width: 800
          height: 600
          alt: Blue to green gradient placeholder image
